# Контролируемый внешний поиск (guard #4): единственное окно агентов наружу.
# Возвращаются ТОЛЬКО результаты с доменов из allowlist; всё прочее отбрасывается.
# Домены подобраны под стартовый домен (program search / алгоритмическое открытие).

allowlist_domains:
  - arxiv.org
  - openreview.net
  - dl.acm.org
  - link.springer.com
  - semanticscholar.org
  - dblp.org
  - epubs.siam.org
  - oeis.org                # база целочисленных последовательностей — прямо в тему
  - codeforces.com          # competitive programming
  - cp-algorithms.com
  - en.wikipedia.org        # обзорные статьи по алгоритмам

# Квота запросов на агента в сутки (защита от неконтролируемого egress).
per_agent_daily_quota: 50
# Жёсткий потолок результатов на один запрос.
max_results_cap: 10
