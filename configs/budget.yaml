# Бюджет. Общий расход отслеживает ВЛАДЕЛЕЦ сам (пополнение API на нём) — здесь
# потолка нет. Для агентов есть только рамка на ОДНО действие (один LLM-вызов):
# budget-guard клампит max_tokens вызова до потолка, чтобы одно действие не могло
# выйти за рамку. Накопительный расход виден в GET /v1/budget (информативно).

per_request:
  max_output_tokens: 8000    # потолок max_tokens на один вызов
  max_cost_usd: 0.50         # если вызов стоил дороже — пишем warning (не блокируем)
