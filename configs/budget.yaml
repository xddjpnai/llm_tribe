# Бюджет. Философия: пополнение API — на тебе; система НЕ должна тратить много сама.
# Поэтому реальный контроль — это ЖЁСТКИЕ капы на задачу/агента/запрос и РАННИЙ
# троттлинг, а total_budget_usd — страховочный потолок: у него система останавливает
# LLM-вызовы и пингует тебя (ты решаешь — поднять лимит и пополнить API, или нет).
# Budget-guard считает два потока (LLM + accrual сервера) против общего потолка.

total_budget_usd: 100     # страховка, не цель. Хочешь дать больше — подними и перезапусти
                          # budget-guard (или задай BUDGET_TOTAL_USD в кредах).

server:
  monthly_cost_usd: 40    # реальная аренда VPS; впиши свою цену после заказа
  accrual: daily

llm:
  # Жёсткий потолок на одну исследовательскую задачу. Мал намеренно — «не тратить
  # много». Можно переопределить в yaml конкретной задачи (configs/tasks/*.yaml).
  per_task_default_cap_usd: 2
  # Суточный кап на агента — страховка от runaway.
  per_agent_daily_cap_usd: 3
  # Кап на один запрос (защита от случайного гигантского контекста).
  per_request_cap_usd: 0.25

thresholds:
  # Доли от total_budget_usd (сервер + LLM суммарно). Пороги ранние — чтобы успеть
  # среагировать до фактического исчерпания.
  warn: 0.50        # уведомление в Telegram владельцам
  throttle: 0.75    # budget-guard разрежает поток LLM-вызовов (задержки)
  hard_stop: 0.90   # полная остановка LLM-вызовов + алерт (дальше решаешь ты)

# Конкурентное распределение: доля бюджета следующей задачи между агентами
# пропорциональна качеству их предыдущих результатов (оценка арбитра 0..1).
competition:
  enabled: true
  min_share: 0.15   # ни один агент не опускается ниже 15% — иначе не выберется из ямы
