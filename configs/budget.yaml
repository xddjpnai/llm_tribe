# Единый бюджет $500 на ВСЁ: LLM API + аренда сервера.
# Budget-guard ведёт два счётчика с общим лимитом (guard #1).

total_budget_usd: 500

server:
  # Аренда VPS начисляется как ежедневный accrual: monthly_cost_usd / 30 в день.
  # Реальную цену вписать после заказа сервера (ориентир shared vCPU 8/32: $30-50/мес).
  monthly_cost_usd: 40
  accrual: daily

llm:
  # Дефолтный жёсткий потолок трат на одну исследовательскую задачу.
  # Может быть переопределён в yaml конкретной задачи (configs/tasks/*.yaml).
  per_task_default_cap_usd: 10
  # Страховка от runaway-агента: суточный кап на агента.
  per_agent_daily_cap_usd: 5
  # Кап на один запрос (защита от случайного гигантского контекста).
  per_request_cap_usd: 0.50

thresholds:
  # Доли от total_budget_usd (сервер + LLM суммарно).
  warn: 0.50        # уведомление в Telegram
  throttle: 0.80    # budget-guard начинает троттлить (очередь + задержки)
  hard_stop: 0.95   # полная остановка LLM-вызовов + kill-switch + алерт

# Конкурентное распределение: доля бюджета следующей задачи между агентами
# пропорциональна качеству их предыдущих результатов (оценка арбитра 0..1).
competition:
  enabled: true
  min_share: 0.15   # ни один агент не опускается ниже 15% — иначе не выберется из ямы
