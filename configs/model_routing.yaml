# Model routing: роль → primary + fallback-цепочка (обязательно другой провайдер).
# Цены ($/1M токенов) использует budget-guard для подсчёта расхода в реальном времени.
#
# Сверено с официальной документацией провайдеров 2026-07-11
# (docs.z.ai, api-docs.deepseek.com, docs.x.ai).
# Цены даны по cache-miss input; кэшированный input у всех провайдеров дешевле,
# так что фактический расход будет НИЖЕ насчитанного — считаем консервативно.

providers:
  zai:
    base_url: https://api.z.ai/api/paas/v4
    api_key_env: ZAI_API_KEY
    protocol: openai            # OpenAI-совместимый chat/completions
  deepseek:
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    protocol: openai
  xai:
    base_url: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
    protocol: openai

models:
  glm-5.2:
    provider: zai
    price_in_per_mtok: 1.4
    price_out_per_mtok: 4.4
  deepseek-v4-flash:
    provider: deepseek
    price_in_per_mtok: 0.14
    price_out_per_mtok: 0.28
  deepseek-v4-pro:
    provider: deepseek
    price_in_per_mtok: 0.435
    price_out_per_mtok: 0.87
  grok-4.3:
    provider: xai
    price_in_per_mtok: 1.25
    price_out_per_mtok: 2.5
  grok-4.5:
    provider: xai
    price_in_per_mtok: 2.0
    price_out_per_mtok: 6.0

# Роли: код запрашивает у budget-guard "роль", а не имя модели. Fallback
# срабатывает при rate limit / 5xx / недоступности провайдера.
# Агент по умолчанию использует researcher (AGENT_ROLE переопределяет); роли
# journal/comms/routine — для сервисов, которые агент построит себе сам.
roles:
  researcher:                   # основной луп агента
    primary: glm-5.2
    fallbacks: [grok-4.3, deepseek-v4-pro]
  routine:                      # дешёвые промежуточные шаги (парсинг/форматирование)
    primary: deepseek-v4-flash
    fallbacks: [grok-4.3]
  coder:                        # генерация/правка кода по спецификации (агент строит
    primary: deepseek-v4-pro    # себе coding-модуль сам и делегирует сюда — в разы
    fallbacks: [glm-5.2]        # дешевле, чем писать код основным researcher-лупом)
  journal:                      # суммаризация для агент-построенного журнала
    primary: deepseek-v4-flash
    fallbacks: [glm-5.2]
  comms:                        # разбор текста для агент-построенного канала связи
    primary: deepseek-v4-flash
    fallbacks: [grok-4.3]
  sage:                         # судья: другой вендор, чем агенты (не предвзят к их модели)
    primary: grok-4.5
    fallbacks: [deepseek-v4-pro]
