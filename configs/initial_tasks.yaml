# Стартовые задачи коллегии. Это ЕДИНСТВЕННОЕ, что задано изначально. Готового
# кода под них НЕТ — агент реализует всё сам через propose_self_modification
# (патч → тест в изоляции → применение), используя только базовые примитивы.
# Дальнейшие задачи приходят уже через канал, который агент построит (task_intake).

- id: setup_journal
  kind: build
  statement: |
    Построй бортовой журнал. Периодически (раз в N шагов или раз в час активности)
    генерируй через LLM (budget-guard, роль journal) человекочитаемое саммари того,
    что коллегия делала и почему, и сохраняй хронологически в markdown/БД —
    отдельно от сырых трейсов. Готового journal-сервиса нет: спроектируй хранение,
    формат и триггеры сам и реализуй через self-modification.

- id: establish_contact
  kind: build
  statement: |
    Установи прямой канал связи с оператором (Telegram; токен и id владельцев — в
    окружении из secrets/credentials.env). Готового бота нет: напиши код, который
    умеет слать оператору уведомления о ключевых событиях (задача закрыта/не
    закрыта, сработал budget-guard, аномалия, kill). Уважай ограничения egress и
    авторизацию — детали границы контроля см. в решении оператора.

- id: task_intake
  kind: build
  statement: |
    Сделай себя способным ПРИНИМАТЬ новые задачи от оператора через построенный
    канал: разобрать свободный текст в постановку и поставить в очередь (валидация —
    только авторизованный оператор). Готового приёма нет: реализуй сам.
