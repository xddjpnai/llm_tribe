# Стартовые задачи коллегии. Это ЕДИНСТВЕННОЕ, что задано изначально. Готового
# кода под них НЕТ — агент реализует всё сам (write_file + run_python + selfmod),
# используя только базовые примитивы. Дальнейшие задачи приходят уже через канал,
# который агент построит (task_intake).
#
# У каждой задачи явно описан artifact для сдачи: мудрец выполняет
# `python3 <artifact>` в свежем чекауте ветки агента, без окружения агента и его
# фоновых процессов — поэтому artifact всегда офлайн-демо, а не живой сервис.

- id: setup_journal
  kind: build
  statement: |
    Построй бортовой журнал коллегии. Замысел: фоновый detached-процесс
    периодически читает свежие записи из Redis-списка `events`, просит LLM
    (budget-guard, роль journal) сжать их в короткое человекочитаемое саммари
    «что коллегия делала и почему» и дописывает его с меткой времени в
    /workspace/journal/journal.md (сырые трейсы не дублировать). Частоту выбери
    сам (например раз в ~50 событий или раз в час). Код держи в
    /workspace/journal/ и закоммить в свою ветку; процесс запусти и убедись по
    его логу, что он жив.
    Artifact для сдачи: /workspace/journal/demo.py — офлайн-скрипт, который на
    зашитых в него примерах событий строит одну запись журнала без сети и без
    LLM (форматирование покажи детерминированно), печатает её и выходит с кодом 0.

- id: establish_contact
  kind: build
  statement: |
    Установи прямой канал связи с оператором: Telegram-бот на ресурсах из
    окружения (TELEGRAM_BOT_TOKEN; владельцы — numeric id из TELEGRAM_OWNER_IDS).
    Готового бота нет — напиши его сам на HTTP Bot API (long polling getUpdates
    с offset + sendMessage) и запусти detached-процессом с логом в файл.
    Требования: при старте попытайся поприветствовать владельцев (если владелец
    ещё не нажал Start у бота, sendMessage вернёт 403 — не падай, продолжай
    polling и поздоровайся, когда он появится в getUpdates); реагируй ТОЛЬКО на
    сообщения от TELEGRAM_OWNER_IDS; шли владельцам уведомления о ключевых
    событиях коллегии (вердикт по задаче, ошибка, аномалия). Код держи в
    /workspace/comms/ и закоммить.
    Artifact для сдачи: /workspace/comms/demo.py — офлайн-скрипт, который на
    зашитых примерах апдейтов проверяет твой разбор сообщений и авторизацию
    владельца (чужой id игнорируется) без сети и выходит с кодом 0.

- id: task_intake
  kind: build
  statement: |
    Сделай коллегию способной ПРИНИМАТЬ новые задачи от оператора через
    построенный канал связи: свободный текст владельца в Telegram превращается
    в постановку задачи и ставится в общую очередь — RPUSH JSON-объекта
    {"id": "...", "statement": "..."} в Redis-список `tasks` (его слушают все
    агенты через BLPOP). Задачами становятся только сообщения от
    TELEGRAM_OWNER_IDS; постановку подтверждай владельцу ответным сообщением.
    Если бот из задачи establish_contact уже построен — расширь его, не строй
    второго. Код закоммить в свою ветку.
    Artifact для сдачи: офлайн-скрипт (например /workspace/intake/demo.py),
    который на зашитом примере текста владельца показывает разбор в JSON-задачу
    и постановку в очередь (Redis замокай) и выходит с кодом 0.
