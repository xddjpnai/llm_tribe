# Сид-задача очереди. Оркестратор читает: id, kind, statement, cap_usd.
# Остальные поля (verification, budget_rationale) — документация для человека.
id: cap_set_construction
kind: maximize
cap_usd: 15

statement: |
  Construct the largest possible cap set in F_3^n (the flagship FunSearch domain)
  for each n in {4, 5, 6, 7}. A cap set is a subset of {0,1,2}^n with no three
  distinct vectors x,y,z such that x+y+z ≡ 0 (mod 3) componentwise.

  Deliverable: a Python module `solution.py` exposing `build_cap_set(n) -> list[tuple]`
  plus `tests/test_cap_set.py` that (a) verifies validity (no forbidden triple),
  and (b) reports the size found for each n. Beat the greedy baseline; document
  which n you improved and the method (construction, local search, or a discovered
  scoring function in the FunSearch style).

verification: >
  Reproducible: arbiter runs build_cap_set(n) for n=4..7, independently re-checks
  the no-collinear-triple invariant, and compares sizes to greedy and to known
  lower bounds. Objective, CPU-only.
budget_rationale: >
  Hardest of the seed set (open search, several n). ~$15: dozens of agent rounds
  on glm-5.2/kimi + code-runner iterations. Reference: DeepMind FunSearch 2023.
