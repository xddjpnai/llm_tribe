id: online_bin_packing_heuristic
kind: maximize
cap_usd: 3

statement: |
  Discover a scoring heuristic for ONLINE bin packing (items arrive one at a time,
  each placed immediately and irrevocably, bin capacity 1.0) that uses fewer bins
  than best-fit and first-fit on a benchmark of item streams drawn from the
  Weibull/OR-library-style distributions.

  Deliverable: `solution.py` with `choose_bin(item, bin_levels) -> int` (index of
  the bin to place the item in, or -1 to open a new bin) and `tests/test_packing.py`
  that runs your policy against best-fit and first-fit on a fixed suite of seeded
  streams and reports the average bin count. The policy must never exceed capacity.
  Report the relative improvement and the discovered scoring rule.

verification: >
  Reproducible: arbiter replays the seeded streams, checks no bin overflows, and
  compares average bins to the two baselines. Objective, CPU-only.
budget_rationale: >
  ~$12: this is the other classic FunSearch result; expect meaningful search over
  scoring functions plus benchmark runs. Deterministic seeds keep re-checks cheap.
