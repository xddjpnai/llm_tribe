name: llm-tribe

# ============================================================================
# Сетевая модель (guard #4):
#   agents_net  (internal) — агенты + сервисы, к которым им можно: budget-guard,
#                            selfmod-api, search-tool, cpu-models, redis, redpanda.
#                            internal:true => у агентов НЕТ выхода в интернет.
#   control_net (internal) — control-plane: оркестратор, арбитр, бот, журнал,
#                            clickhouse, grafana + общая инфра.
#   egress_net  (bridge)   — выход наружу ТОЛЬКО у budget-guard (LLM API),
#                            search-tool (поиск по allowlist), comms-bot (Telegram),
#                            selfmod-api (pip при пересборке образов).
# ============================================================================

networks:
  agents_net:
    internal: true
  control_net:
    internal: true
  egress_net:
    driver: bridge

volumes:
  # Приватные папки агентов — отдельные volumes, монтируются ровно в один контейнер (guard #3)
  agent1_private:
  agent2_private:
  agent3_private:
  workspace:          # общий git-репозиторий коллегии (ветка на агента, мержи через арбитра)
  journal_data:       # markdown бортового журнала
  redpanda_data:
  redis_data:
  clickhouse_data:
  grafana_data:
  cpu_models_cache:   # веса ONNX-эмбеддера / OCR, чтобы не тянуть при рестарте

# ---------------------------------------------------------------------------
# Общий шаблон агента-исследователя
# ---------------------------------------------------------------------------
x-agent-base: &agent-base
  build: ./services/agent
  restart: unless-stopped
  networks: [agents_net]
  depends_on: [redis, redpanda, budget-guard]
  environment: &agent-env
    BUDGET_GUARD_URL: http://budget-guard:8080
    SELFMOD_API_URL: http://selfmod-api:8090
    SEARCH_TOOL_URL: http://search-tool:8070
    CPU_MODELS_URL: http://cpu-models:8060
    REDIS_URL: redis://redis:6379/0
    KAFKA_BROKERS: redpanda:9092
  # Ресурсные квоты (guard #5). Эксперименты агент гоняет внутри своего же
  # контейнера — cgroup-лимиты ниже и internal-сеть и есть песочница v1.
  deploy:
    resources:
      limits:
        cpus: "1.5"
        memory: 2G
        pids: 256
  security_opt:
    - no-new-privileges:true
  cap_drop: [ALL]

services:
  # ========================= инфраструктура =========================
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --mode dev-container
      - --smp 1
      - --memory 2G
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    restart: unless-stopped
    networks: [agents_net, control_net]
    volumes: [redpanda_data:/var/lib/redpanda/data]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 3G }

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    networks: [agents_net, control_net]
    volumes: [redis_data:/data]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 1500M }

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    networks: [control_net]
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 6G }

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    networks: [control_net, egress_net]   # egress: только чтобы отдать UI наружу через host-порт
    ports:
      - "127.0.0.1:3000:3000"             # доступ с ноутбука через ssh -L 3000:localhost:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}   # раскрывается в provisioning datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [clickhouse]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 1G }

  # ========================= защитный контур =========================
  budget-guard:
    build: ./services/budget_guard
    restart: unless-stopped
    # единственная точка входа ко всем платным LLM API (guard #1)
    networks: [agents_net, control_net, egress_net]
    environment:
      ZAI_API_KEY: ${ZAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://redis:6379/1
      CLICKHOUSE_URL: http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      KAFKA_BROKERS: redpanda:9092
    volumes:
      - ./configs:/configs:ro
    depends_on: [redis, redpanda]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  selfmod-api:
    build: ./services/selfmod_api
    restart: unless-stopped
    networks: [agents_net, control_net, egress_net]  # egress: pip/registry при пересборке
    volumes:
      # ЕДИНСТВЕННЫЙ контейнер с docker.sock (guard #2).
      # Агенты видят только HTTP API: патч -> тесты в изолированном раннере -> rebuild.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/agent:/build_context/agent
      - workspace:/workspace
    environment:
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }

  search-tool:
    build: ./services/search_tool
    restart: unless-stopped
    networks: [agents_net, control_net, egress_net]
    environment:
      SEARCH_API_KEY: ${SEARCH_API_KEY}
      KAFKA_BROKERS: redpanda:9092
      # allowlist источников и квоты запросов — в конфиге сервиса
    volumes:
      - ./configs:/configs:ro
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  # ========================= control plane =========================
  orchestrator:
    build: ./services/orchestrator
    restart: unless-stopped
    networks: [control_net]
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      BUDGET_GUARD_URL: http://budget-guard:8080
    volumes:
      - ./configs:/configs:ro
      - workspace:/workspace
    depends_on: [redis, redpanda, budget-guard]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  arbiter:
    build: ./services/arbiter
    restart: unless-stopped
    networks: [control_net]
    environment:
      BUDGET_GUARD_URL: http://budget-guard:8080
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
    volumes:
      - ./configs:/configs:ro
      - workspace:/workspace:ro     # арбитру достаточно чтения для воспроизведения результатов
    depends_on: [budget-guard, redpanda]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }

  comms-bot:
    build: ./services/comms_bot
    restart: unless-stopped
    networks: [control_net, egress_net]   # egress: api.telegram.org
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_USER_ID: ${TELEGRAM_ADMIN_USER_ID}
      KAFKA_BROKERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8000
      JOURNAL_URL: http://journal:8050
      BUDGET_GUARD_URL: http://budget-guard:8080
    depends_on: [redpanda, orchestrator]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 384M }

  journal:
    build: ./services/journal
    restart: unless-stopped
    networks: [control_net]
    environment:
      BUDGET_GUARD_URL: http://budget-guard:8080
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
    volumes:
      - journal_data:/journal
    depends_on: [redpanda, budget-guard]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 384M }

  # ========================= self-hosted CPU-модели =========================
  cpu-models:
    build: ./services/cpu_models
    restart: unless-stopped
    networks: [agents_net, control_net]   # бесплатный сервис, budget-guard не нужен
    volumes:
      - cpu_models_cache:/models
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 4G }

  # ========================= агенты-исследователи =========================
  agent-1:
    <<: *agent-base
    environment:
      <<: *agent-env
      AGENT_ID: agent-1
      AGENT_ROLE: researcher
    volumes:
      - agent1_private:/private
      - workspace:/workspace

  agent-2:
    <<: *agent-base
    environment:
      <<: *agent-env
      AGENT_ID: agent-2
      AGENT_ROLE: researcher
    volumes:
      - agent2_private:/private
      - workspace:/workspace

  agent-3:
    <<: *agent-base
    environment:
      <<: *agent-env
      AGENT_ID: agent-3
      AGENT_ROLE: researcher_toolheavy
    volumes:
      - agent3_private:/private
      - workspace:/workspace
