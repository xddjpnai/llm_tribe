name: llm-tribe

# Минимальное зерно. Агенты сами себя переписывают и наращивают функционал через
# selfmod-api (обязательный прогон в песочнице ПЕРЕД тем, как полагаться на новый
# код — чтобы не убить себя). Мы даём только РЕСУРСЫ: доступ к LLM (budget-guard),
# секреты (канал связи Telegram и т.д.), общий workspace, egress наружу.
#
# Защищено от агентов (guard):
#   - kill-switch: на уровне хоста (scripts/kill.sh = docker stop агентов) — агент
#     не может его отменить из контейнера;
#   - креды: secrets/credentials.env (не монтируется агентам; selfmod отклоняет
#     патчи к secrets/ и к самому механизму защиты).

networks:
  net:
    driver: bridge          # egress включён: агенты сами строят связь/поиск наружу

volumes:
  agent1_private:
  agent2_private:
  agent3_private:
  workspace:                # общий git-репозиторий: агенты пишут сюда свой код/инструменты
  redis_data:

# ------------------------------- агент -------------------------------
x-agent-base: &agent-base
  build: ./services/agent
  restart: unless-stopped
  networks: [net]
  # sage тоже нужен: submit_result зовёт его для вердикта. Именно healthy, не
  # started: стартовые задачи клеймятся одноразово (SETNX), и агент, дёрнувший
  # ещё не готовый сервис на первом старте, сжёг бы claim впустую.
  depends_on:
    redis: { condition: service_healthy }
    budget-guard: { condition: service_healthy }
    selfmod-api: { condition: service_healthy }
    sage: { condition: service_healthy }
  environment: &agent-env
    BUDGET_GUARD_URL: http://budget-guard:8080   # единственный доступ к LLM
    SELFMOD_API_URL: http://selfmod-api:8090      # патч → песочница → применение
    SAGE_URL: http://sage:8095                    # мудрец: вердикт по сданной работе
    REDIS_URL: redis://redis:6379/0
    INITIAL_TASKS: /seed/initial_tasks.yaml
    # ресурс «канал связи»: агент сам строит бота на этом токене
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    TELEGRAM_OWNER_IDS: ${TELEGRAM_OWNER_IDS}
  # NB: тома НЕ здесь — docker-compose заменяет список volumes целиком (не мержит),
  # поэтому каждый agent-N задаёт свой полный набор (общий workspace + своя private).
  deploy:
    resources:
      limits: { cpus: "1.5", memory: 2G, pids: 256 }
  security_opt: [no-new-privileges:true]
  cap_drop: [ALL]

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    networks: [net]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 768M }

  # LLM-шлюз: единственная точка ко всем провайдерам; ключи только здесь; учёт $ и капы.
  budget-guard:
    build: ./services/budget_guard
    restart: unless-stopped
    networks: [net]
    environment:
      ZAI_API_KEY: ${ZAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./configs:/configs:ro
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      # python:slim без curl — проверяем /healthz через stdlib urllib
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  # Механизм самопереписывания: патч агента → тест в одноразовом контейнере → применение.
  # ЕДИНСТВЕННЫЙ контейнер с docker.sock. Защищённые пути (креды/деньги/сам механизм)
  # отклоняются до применения.
  selfmod-api:
    build: ./services/selfmod_api
    restart: unless-stopped
    networks: [net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/agent:/build_context/agent
      - workspace:/workspace
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }

  # Мудрец: независимый судья общины. Воспроизводит артефакт из ветки агента +
  # LLM-оценка (роль sage = другой вендор). Агентами не изменяем (protect.py).
  sage:
    build: ./services/sage
    restart: unless-stopped
    networks: [net]
    environment:
      BUDGET_GUARD_URL: http://budget-guard:8080
      REDIS_URL: redis://redis:6379/0
      WORKSPACE: /workspace
    volumes:
      - workspace:/workspace:ro
    depends_on:
      budget-guard: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8095/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }

  # ------------------------------- агенты -------------------------------
  agent-1:
    <<: *agent-base
    environment:
      <<: *agent-env
      AGENT_ID: agent-1
    volumes:
      - agent1_private:/private
      - workspace:/workspace
      - ./configs/initial_tasks.yaml:/seed/initial_tasks.yaml:ro

  agent-2:
    <<: *agent-base
    environment:
      <<: *agent-env
      AGENT_ID: agent-2
    volumes:
      - agent2_private:/private
      - workspace:/workspace
      - ./configs/initial_tasks.yaml:/seed/initial_tasks.yaml:ro

  agent-3:
    <<: *agent-base
    environment:
      <<: *agent-env
      AGENT_ID: agent-3
    volumes:
      - agent3_private:/private
      - workspace:/workspace
      - ./configs/initial_tasks.yaml:/seed/initial_tasks.yaml:ro
