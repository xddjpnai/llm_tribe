apiVersion: 1

# Datasource ClickHouse. Пароль берётся из переменной окружения контейнера
# grafana (compose пробрасывает CLICKHOUSE_PASSWORD) — Grafana раскрывает ${VAR}
# в provisioning-файлах.
datasources:
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: default
      defaultDatabase: default
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
    editable: false
